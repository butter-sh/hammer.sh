name: "{{project_name}}"
version: "2.2.0"
description: "Beautiful documentation and landing page generator for arty.sh projects and butter.sh"
author: ""
license: "MIT"

main: leaf.sh

references:
- https://github.com/butter-sh/judge.sh.git
- https://github.com/butter-sh/myst.sh.git

# Dependencies
dependencies:
- yq # YAML parser (required)
- jq # JSON processor (required)

# Available commands
scripts:
  test: "arty exec judge run"
  test/update: "arty exec judge run -u"
  test/setup: "arty exec judge setup"
  test/verbose: "arty exec judge run -v"
